<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tools</title>
  <meta name="description" content="Check the current time, compare dates, convert time zones, and convert Unix timestamps.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#333333">
  <link rel="canonical" href="https://time.jeme.app/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Time Tools">
  <meta property="og:description" content="Check the current time, compare dates, convert time zones, and convert Unix timestamps.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://time.jeme.app/">
  <meta property="og:site_name" content="Time Tools">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Time Tools">
  <meta name="twitter:description" content="Check the current time, compare dates, convert time zones, and convert Unix timestamps.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <section id="time-now-section">
      <h2>Date &amp; Time</h2>
      <div class="date-picker-row">
        <label for="date-now">Select date:</label>
        <input type="date" id="date-now">
      </div>
      <p id="time-now" class="current-time" aria-live="off"></p>
      <dl class="date-details" aria-live="polite">
        <div>
          <dt>Date</dt>
          <dd id="date-formatted"></dd>
        </div>
        <div>
          <dt>Week</dt>
          <dd id="date-week"></dd>
        </div>
        <div>
          <dt>Day of year</dt>
          <dd id="date-day-of-year"></dd>
        </div>
        <div>
          <dt>Quarter</dt>
          <dd id="date-quarter"></dd>
        </div>
        <div>
          <dt>Year remaining</dt>
          <dd id="date-remaining"></dd>
        </div>
      </dl>
    </section>
    <section id="time-diff-section">
      <h2>Time Diff</h2>
      <div>
        <label for="diff-start">Start:</label>
        <input type="date" id="diff-start">
      </div>
      <div>
        <label for="diff-end">End:</label>
        <input type="date" id="diff-end">
      </div>
      <p id="time-diff"></p>
    </section>
    <section id="tiemzone-convert-section">
      <h2>Time Zone Converter</h2>
      <div>
        <label for="timezone-start">Time:</label>
        <input type="datetime-local" id="timezone-start">
      </div>
      <div>
        <label for="timezone-from">From:</label>
        <select id="timezone-from"></select>
      </div>
      <div>
        <label for="timezone-to">To:</label>
        <select id="timezone-to"></select>
      </div>
      <p id="timezone-end"></p>
    </section>
    <section id="epoch-convert-section">
      <h2>Epoch Converter</h2>
      <div>
        <label for="epoch-seconds">Unix epoch:</label>
        <input type="number" id="epoch-seconds" step="1">
      </div>
      <div>
        <label for="epoch-datetime">Local date and time:</label>
        <input type="datetime-local" id="epoch-datetime" step="1">
      </div>
      <p id="epoch-status" aria-live="polite"></p>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.34/moment-timezone-with-data.min.js"></script>
  <script src="scripts.js"></script>
</body>

</html>
